  <line x1="76" y1="42" x2="82" y2="42" stroke="#35D07F" stroke-width="1.5" opacity="0.5"/>
  <line x1="38" y1="70" x2="44" y2="70" stroke="#35D07F" stroke-width="1.5" opacity="0.5"/>
  <line x1="76" y1="70" x2="82" y2="70" stroke="#35D07F" stroke-width="1.5" opacity="0.5"/>
</svg>
