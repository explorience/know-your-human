  <circle cx="60" cy="60" r="48" stroke="#35D07F" stroke-width="2" opacity="0.15"/>
  
  <!-- Shield shape -->
  <path d="M60 18 L92 36 L92 66 C92 84 76 98 60 104 C44 98 28 84 28 66 L28 36 Z" 
